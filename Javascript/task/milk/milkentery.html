<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <!-- Top Navbar -->
        <div class="topbar d-flex justify-content-between align-items-center ">
            <h4 class="m-0">🐄 Dairy Farm Dashboard</h4>
            <div>
                <h5 id="clock" class="m-0"></h5>
            </div>

            <div class="d-flex align-items-center gap-3">
                <span class="admin-name" id="admin">👤 Admin</span>
                <button class="btn btn-light" id="modeBtn">
                    🌙 Dark
                </button>
            </div>
        </div>
        <div class="row">

            <div class="col-md-2 sidebar p-3">
                <!-- <h3 class="text-center text-white mb-4">🐄 Dairy Farm</h3> -->

                <ul class="nav flex-column">
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="./addcow.html" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="./milkentery.html" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="./expense.html" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="./reports.html" class="nav-link">Reports</a></li>
                </ul>
            </div>

            <div class="col-md-10 p-4">

                <h2> Daily Milk Entry</h2>

                <div class="cow-form p-4 mt-4">
                    <form action="" id="rest">
                        <div class="row g-3">

                            <div class="col-md-4">
                                <select id="milkCowName" class="form-control">
                                    <option value="">
                                        Select Cow
                                    </option>
                                </select>
                                <span id="error"></span>
                            </div>

                            <div class="col-md-3">
                                <input type="number" id="morning" class="form-control" placeholder="Morning Milk">
                            </div>

                            <div class="col-md-3">
                                <input type="number" id="evening" class="form-control" placeholder="Evening Milk">
                            </div>

                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100">Add</button>
                            </div>

                        </div>
                    </form>
                </div>

                <div class="container">
                    <table class="table table-striped mt-4">
                        <thead class="table-dark">
                            <tr>
                                <th>Cow Name</th>
                                <th>Morning</th>
                                <th>Evening</th>
                                <th>Total</th>
                            </tr>
                        </thead>

                        <tbody id="milkTable"></tbody>

                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>

        // // milkentry---------------------------------------------------------------------

        // let mainarray=new Array()

        let milkEntries = JSON.parse(localStorage.getItem("Milkentry")) || [];
        function loadCowOptions() {

            let cows = JSON.parse(localStorage.getItem("cows")) || [];
            let select = document.getElementById("milkCowName");
            select.innerHTML = `<option value="">Select Cow</option> `

            cows.forEach((cow) => {
                // console.log(cow);

                select.innerHTML += `
            <option value="${cow.cowName}">
                ${cow.cowName}
            </option>`

            });
            // console.log(select);

        }

        let form1 = document.getElementById("rest")
        
        

        form1.addEventListener("submit", (e) => {
            e.preventDefault()

            let name = document.getElementById("milkCowName").value;
            let morning = (document.getElementById("morning").value);
            let evening = (document.getElementById("evening").value);
            let cowerrror = document.getElementById("error")


            if (name == "" || morning == "" || evening == "") {
                alert("Fill all fields");
                return;
            }

            let total = Number(morning) + Number(evening);

            let Entry = {
                name: name,
                morning: morning,
                evening: evening,
                total: total
            };
            milkEntries.push(Entry)
           

            localStorage.setItem("Milkentry", JSON.stringify(milkEntries))
            

            document.getElementById("rest").reset();
         
            showMilk()
        })

        // function addMilkEntry(e) {
        //     debugger


        // }
        function showMilk() {
            let milkEntries = JSON.parse(localStorage.getItem("Milkentry")) || [];
            let table = document.getElementById("milkTable");
            table.innerHTML = "";
            milkEntries.forEach((milk) => {
                table.innerHTML += `
                 <tr>
                  <td>${milk.name}</td>
                  <td>${milk.morning} L</td>
                  <td>${milk.evening} L</td>
                  <td><b>${milk.total} L</b></td>
                  </tr>`;
            });
            console.log(table);

        }
        loadCowOptions();
        showMilk()


    </script>
</body>

</html>

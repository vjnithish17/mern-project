<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <!-- Top Navbar -->
        <div class="topbar d-flex justify-content-between align-items-center p-3 ">
            <h4 class="m-0">🐄 Dairy Farm Dashboard</h4>
            <div>
                <h5 id="clock" class="m-0"></h5>
            </div>

            <div class="d-flex align-items-center gap-3">
                <span class="admin-name" id="admin">👤 Admin</span>
                <button class="btn btn-light" id="modeBtn">
                    🌙 Dark
                </button>
            </div>
        </div>
        <div class="row">
            <!-- Sidebar -->

            <div class="col-md-2 sidebar p-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="./addcow.html" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="./milkentery.html" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="./expense.html" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="./reports.html" class="nav-link">Reports</a></li>
                </ul>

            </div>

            <!-- Main -->

            <div class="col-md-10 p-4">

                <h2>Dairy Reports</h2>

                <div class="row g-4 mt-2">

                    <div class="col-md-3">
                        <div class="card-box bg-primary">
                            <h5>Total Milk</h5>
                            <h2 id="reportMilk">0 L</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-success">
                            <h5>Total Income</h5>
                            <h2 id="reportIncome">₹0</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-danger">
                            <h5>Total Expense</h5>
                            <h2 id="reportExpense">₹0</h2>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-dark">
                            <h5>Total Profit</h5>
                            <h2 id="reportProfit">₹0</h2>
                        </div>
                    </div>

                </div>

                <!-- Report Table -->

                <div class="mt-5">

                    <h4>Daily Summary</h4>

                    <table class="table table-striped mt-3">

                        <thead class="table-dark">

                            <tr>
                                <th>Date</th>
                                <th>Milk</th>
                                <th>Income</th>
                                <th>Expense</th>
                                <th>Profit</th>
                            </tr>

                        </thead>

                        <tbody id="reportTable">

                            <tr>
                                <td>12-05-2026</td>
                                <td>85 L</td>
                                <td>₹4250</td>
                                <td>₹2500</td>
                                <td>₹1750</td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>
        </div>
    </div>

    <script src="./milk.js"></script>

</body>

</html>

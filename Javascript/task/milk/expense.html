<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">
        <!-- Top Navbar -->
        <div class="topbar d-flex justify-content-between align-items-center p-3 ">
            <h4 class="m-0">🐄 Dairy Farm Dashboard</h4>
            <div>
                <h5 id="clock" class="m-0"></h5>
            </div>

            <div class="d-flex align-items-center gap-3">
                <span class="admin-name" id="admin">👤 Admin</span>
                <button class="btn btn-light" id="modeBtn">
                    🌙 Dark
                </button>
            </div>
        </div>
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-3">

                <ul class="nav flex-column">
                    <li class="nav-item"><a href="./dashboard.html" class="nav-link active">Dashboard</a></li>
                    <li class="nav-item"><a href="./addcow.html" class="nav-link">Add Cow</a></li>
                    <li class="nav-item"><a href="./milkentery.html" class="nav-link">Milk Entry</a></li>
                    <li class="nav-item"><a href="./expense.html" class="nav-link">Expense</a></li>
                    <li class="nav-item"><a href="./reports.html" class="nav-link">Reports</a></li>
                </ul>

            </div>

            <!-- Main -->

            <div class="col-md-10 p-4">

                <h2>Daily Expense Entry</h2>

                <div class="cow-form p-4 mt-4">
                    <form id="exrest">
                        <div class="row g-3">

                            <div class="col-md-4">
                                <select id="expenseType" class="form-control">
                                    <option value=""> Select Expense</option>
                                    <option value="Food">Food</option>
                                    <option value="Milk">Milk</option>
                                    <option value="Medicine">Medicine</option>
                                    <option value="Labour"> Labour</option>
                                    <option value="Electricity">Electricity</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <input type="number" id="expenseAmount" class="form-control" placeholder="Enter Amount">
                            </div>

                            <div class="col-md-4">
                                <button class="btn btn-success w-100" onclick="addExpense()"> Add
                                    Expense</button>
                            </div>
                        </div>
                </div>
                </form>
                <!-- Table -->
                <div class="expense-content">
                    <div class="left-content">
                        <table class="table">
                            <thead class="table-dark">
                                <tr class="expent">
                                    <th>Expense Type</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <div class="overflow">
                                <tbody id="expenseTable"></tbody>
                            </div>
                        </table>
                    </div>
                    <!-- Total -->
                    <div class="right-t">
                        <div class="card-box bg-danger mt-4 p-4">
                            <h4>Total Expense</h4>
                            <h2 id="totalExpense"> ₹0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script >

        // // expense------------------------------------------------------------

        let totalex = JSON.parse(localStorage.getItem("expenseamount")) || [];
        let addExpense = () => {
            let type = document.getElementById("expenseType").value;
            let amount = (document.getElementById("expenseAmount").value);

            if (type == "") {
                alert("Select Type");
                return;
            }

            if (amount == "") {
                alert("EnterAmount");
                return;
            }
            let expenses = {
                type,
                amount
            }
            totalex.push(expenses)
            localStorage.setItem("expenseamount", JSON.stringify(totalex));
            document.getElementById("exrest").reset();
            showexpense()
        }
        // Always show content

        let showexpense = () => {
            // let totalex = JSON.parse(localStorage.getItem("expenseamount")) || [];
            let table = document.getElementById("expenseTable");
            if (!table) return;
            let total = 0;
            table.innerHTML = ""
            totalex.forEach((exp) => {
                total += Number(exp.amount);

                table.innerHTML += `
        <tr>
            <td>${exp.type}</td>
            <td>₹${exp.amount}</td>
        </tr>`;
            });
            document.getElementById("totalExpense").innerHTML = `₹${total}`;
        };
        showexpense();


    </script>

</body>

</html>

<!DOCTYPE html>
 <html lang="en">

 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
     <link rel="stylesheet" href="css/style.css">
 </head>

 <body>

     <!-- curd operation -->


     <div class="form-container">
         <h1>To do list</h1>
         <form action="" id="todoform" onsubmit="submitFun(event)">
             <div class="form-control">
                 <label for="">Task Name</label>
                 <input type="text" id="task_name" placeholder="ex.john" required>
                 <span id="nameerr" class="error"></span>
             </div>
             <div class="form-control">
                 <label for="home"><input type="radio" id="home" class="group" name="work" required
                         value="HOME_WORK">Home work</label>
                 <label for="office"><input type="radio" id="office" class="group" name="work" required
                         value="OFFICE_WORK">OFFICE
                     work</label>

                 <span id="nameerr" class="error"></span>
             </div>
             <div class="form-control">
                 <button type="submit">Add</button>

             </div>
         </form>
         <h5>Lists</h5>
         <input type="text" name="" id="searchbox" placeholder="search task">
         <div class="container">

             <div class="taskbox">
                 <div class="box box1">
                     <label for=""><input type="checkbox" name="" id="">task name</label>
                 </div>
                 <div class="box box2">
                     <button type="button">delete</button>
                     <button type="button">edit</button>
                 </div>
             </div>
             <div class="taskbox">
                 <div class="box box1">
                     <label for=""><input type="checkbox" name="" id="">task name</label>
                 </div>
                 <div class="box box2">
                     <button type="button">delete</button>
                     <button type="button">edit</button>
                 </div>
             </div>
             <div class="taskbox">
                 <div class="box box1">
                     <label for=""><input type="checkbox" name="" id="">task name</label>
                 </div>
                 <div class="box box2">
                     <button type="button">delete</button>
                     <button type="button">edit</button>
                 </div>
             </div>
             <div class="taskbox">
                 <div class="box box1">
                     <label for=""><input type="checkbox" name="" id="">task name</label>
                 </div>
                 <div class="box box2">
                     <button type="button">delete</button>
                     <button type="button">edit</button>
                 </div>
             </div>
         </div>
     </div>

     <script>
         let taskslist = [];
         let editIndex = null;
         document.querySelector(".container").innerHTML = ""
         let submitFun = (event) => {
             event.preventDefault();
             debugger
             let task_name = document.querySelector("#task_name").value
             let group = document.querySelector("input[name='work']:checked").value
             let todoform = document.querySelector("#todoform")
             console.log(task_name.value, group.value);

             // add and update

             let tasks = {
                 task_name,
                 group
             }

             if (editIndex == null) {
                 taskslist.push(tasks)

                 localStorage.setItem("taskslist", JSON.stringify(taskslist))
             } else {
                 console.log("updated");
                 let taskslist = JSON.parse(localStorage.getItem("taskslist"))

                 let updated = taskslist.map((ele, idx) => {

                     if (idx == editIndex) {
                         return tasks
                     } else {
                         return ele
                     }

                 })
                 editIndex = null
                 localStorage.setItem("taskslist", JSON.stringify(updated))
             }

             todoform.reset()
             loadToDoList()
         }

         let updatelist = (index) => {
             editIndex = index
             let taskslist = JSON.parse(localStorage.getItem("taskslist"))
             let filted = taskslist.filter((ele, idx) => idx == index)
             console.log(filted);

             let [t] = filted

             document.querySelector("#task_name").value = t.task_name
             if (t.group == "HOME_WORK") {
                 document.querySelector("#home").checked = t.group
             } else {
                 document.querySelector("#office").checked = t.group
             }


         }



         let loadToDoList = () => {
             let taskslist = JSON.parse(localStorage.getItem("taskslist"))

             let list = ''
             taskslist.forEach((ele, index) => {
                 console.log(ele);
                 list += ` <div class="taskbox">
                            <div class="box box1">
                                <label for=""><input type="checkbox" name="" id="">${ele.task_name} ${ele.group}</label>
                            </div>
                            <div class="box box2">
                                <button type="button" onclick="deletelist(${index})">delete</button>
                                <button type="button" onclick="updatelist(${index})">edit</button>
                            </div>
                        </div>`
             })

             document.querySelector(".container").innerHTML = list
         }

         loadToDoList()


         let deletelist = (index) => {
             console.log(index);
             let taskslist = JSON.parse(localStorage.getItem("taskslist"))

             let c = confirm("do you want to delete?")

             if (c) {
                 let filted = taskslist.filter((ele, idx) => idx != index)

                 console.log(filted);

                 localStorage.setItem("taskslist", JSON.stringify(filted))

                 loadToDoList()
                 alert("deleted successfully")
             } else {
                 alert("your data is safe")
             }
         }


         let searchbox = document.querySelector("#searchbox")

         searchbox.addEventListener("keyup", () => {
             let taskslist = JSON.parse(localStorage.getItem("taskslist"))

             if (searchbox.value == "") {
                 loadToDoList()
             } else {
                 let filtedlist = taskslist.filter((ele) => ele.task_name == searchbox.value)

                 let list = ''
                 filtedlist.forEach((ele, index) => {
                     console.log(ele);
                     list += ` <div class="taskbox">
                            <div class="box box1">
                                <label for=""><input type="checkbox" name="" id="">${ele.task_name} ${ele.group}</label>
                            </div>
                            <div class="box box2">
                                <button type="button" onclick="deletelist(${index})">delete</button>
                                <button type="button" onclick="updatelist(${index})">edit</button>
                            </div>
                        </div>`
                 })

                 document.querySelector(".container").innerHTML = list
             }


         })
     </script>
 </body>

 </html>

    <div class="timezone">
        <span id="hour">11</span>:
        <span id="minutes">17</span>:

        <h1 id="localtimes"></h1>

        <button onclick="stopClock()">Stop</button>
    </div>

    <script>

        let updateTime = () => {
            let date = new Date()

            let h = date.getHours()
            let m = date.getMinutes()
            let s = date.getSeconds()

            let hour = document.getElementById("hour")
            let minutes = document.getElementById("minutes")
            let seconds = document.getElementById("seconds")

            hour.innerHTML = h
            minutes.innerHTML = m
            seconds.innerHTML = s

            let localtimes = document.getElementById("localtimes")
            localtimes.innerHTML = date.toLocaleTimeString()


        }

        let clock = setInterval(updateTime, 1000)
        let stopClock = () => {
            clearInterval(clock)
        }

        let startClock = () => {
            clearInterval(clock)
            clock = setInterval(updateTime, 1000)
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            background-color: wheat;
        }
        .box{
            /* border: 2px solid; */
            height: 200px;
            width: 300px;
            position: relative;
            background-color: rgba(127, 255, 212, 0.685);
            border-radius: 20px;
            box-shadow: 10px 20px 10px aquamarine;
        }
        .btn{
            /* border: 2px solid; */
            height: 100px;
            width: 100%;
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        button{
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    
<div class="box">
    <h1 id="count" style="text-align: center;"> 0</h1>
      <div class="btn">
        <button onclick="increse()">+</button>
         <button onclick="reset()">Reset</button>
        <button onclick="decrese()">-</button>
       
      </div>
</div>
<script>
     debugger

    let count=0
    let increse=()=>{
        count=count+1
        document.getElementById("count").innerText=count
    }
    let reset=()=>{
        count=0
        document.getElementById("count").innerText=count
    }
   
    let decrese=()=>{
        if(count > 0){
              count=count-1
        }
       
         document.getElementById("count").innerText=count
    }



</script>
</body>
</html>

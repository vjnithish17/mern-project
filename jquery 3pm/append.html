<span>Naveen</span>
    <input type="text" id="uname" placeholder="enter name">
    <button id="add">add Name</button>
    <button id="after">after</button>
    <button id="before">before</button>

    <!-- <ul id="namelist">

    </ul> -->

    

    <!-- <button id="text">append text</button> -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>
        $(document).ready(() => {

            $("#after").on("click",()=>{
                let uname = $("#uname").val()
                $("span").after(uname)
            })

            $("#before").on("click",()=>{
                let uname = $("#uname").val()
                $("span").before(uname)
            })


            $("#add").on("click", () => {
                let uname = $("#uname").val()
                 let list = `${uname}`
                 $("span").append(list)
            })

    </script>
</body>
